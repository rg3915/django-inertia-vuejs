services:
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - movies-network

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file: .env
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - movies-network

volumes:
  pgdata:

networks:
  movies-network:
